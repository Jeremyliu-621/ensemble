# BAR-LINE model — stage 2: GRPO against the musicality reward in environment.py.
# structured_outputs pins the notes schema so rollouts can't leave format.
# After the SFT run finishes: set init_from_adapter = "<sft-run-id>" AND remove
# lora_rank/lora_alpha (the source adapter's values are authoritative).

model = "Qwen/Qwen3.5-4B"
algorithm = "grpo"

[environment]
id = "neuroscore/wand-barline"

[train]
# init_from_adapter = "<sft-run-id>"   # <- fill in after SFT; then delete rank/alpha below
lora_rank = 32
lora_alpha = 64
max_steps = 400
max_examples = 600
group_size = 8
temperature = 0.8
max_completion_tokens = 300
kl_penalty_coef = 0.01
max_context_tokens = 1024
structured_outputs = '{"type":"object","properties":{"notes":{"type":"array","maxItems":16,"items":{"type":"array","minItems":4,"maxItems":4,"items":{"type":"number"}}}},"required":["notes"],"additionalProperties":false}'
