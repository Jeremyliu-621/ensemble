<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#f0e6d2">
  <title>Ensemble — Section</title>
  <link rel="icon" href="../assets/pixel/logo_wand.png">
  <link rel="stylesheet" href="../shared/pixel.css">
  <style>
    /* Phone = one performer in the cozy-pixel orchestra. The audience sees
       this screen propped up around the room, so it IS the musician: a giant
       pixel artist who plays exactly while this phone's notes sound.
       Diagnostics hide in a collapsed footer. */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; font-family: var(--px-body); background: var(--paper); color: var(--ink); overflow: hidden; }
    img { image-rendering: pixelated; user-select: none; -webkit-user-drag: none; }

    #join { position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem; cursor: pointer; text-align: center; }
    #join img { width: 72px; height: 72px; }
    #join h1 { font: 700 clamp(1.4rem, 8vw, 2.6rem)/1.2 var(--px-display); letter-spacing: .02em;
      text-shadow: 3px 3px 0 rgba(54,38,25,.15); }
    #join p { color: var(--ink-soft); font-size: 1.05rem; }
    #join .chip { font: 700 10px var(--px-display); text-transform: uppercase; color: #fff;
      background: var(--purple); border: 2px solid var(--ink); border-radius: 8px;
      padding: .5rem .8rem; box-shadow: var(--shadow); }

    #stage { position: fixed; inset: 0; display: none; flex-direction: column; }
    #stagearea { flex: 1; min-height: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2vh; padding: 3vh 1rem 1vh; }
    #artist { height: min(62vh, 120vw); max-width: 92vw; object-fit: contain;
      transform-origin: 50% 94%; animation: breathe 3.2s ease-in-out infinite; }
    #instnm { font: 700 clamp(1rem, 7vw, 1.6rem) var(--px-display); text-transform: uppercase;
      letter-spacing: .06em; text-shadow: 3px 3px 0 rgba(54,38,25,.14); }
    /* idle: a slow breath. playing: the artist performs, in tempo-ish sway;
       each loud note lands a little accent pop on top. */
    @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.015); } }
    @keyframes perform {
      0%   { transform: rotate(-3.5deg); }
      25%  { transform: rotate(0deg) translateY(-1.2vh); }
      50%  { transform: rotate(3.5deg); }
      75%  { transform: rotate(0deg) translateY(-1.2vh); }
      100% { transform: rotate(-3.5deg); }
    }
    #artist.playing { animation: perform .72s ease-in-out infinite; }
    #artist.accent { filter: brightness(1.18); }

    #hud { padding: .5rem 1rem calc(.5rem + env(safe-area-inset-bottom)); font-size: 13px;
      background: var(--card); border-top: 3px solid var(--ink); }
    #hud .k { font: 700 8px var(--px-display); text-transform: uppercase; letter-spacing: .08em; color: var(--ink-soft); }
    #hudtop { display: flex; align-items: center; gap: .6rem; }
    #hudtop #sid { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #nerd summary { cursor: pointer; font: 700 8px var(--px-display); text-transform: uppercase;
      letter-spacing: .08em; color: var(--ink-soft); padding: .3rem 0; list-style: none; }
    #nerd .grid { display: grid; grid-template-columns: 1fr 1fr; gap: .3rem 1rem; padding-bottom: .3rem; }
    #trimrow { display: flex; align-items: center; gap: .5rem; grid-column: 1 / -1; }
    #trimrow input { flex: 1; accent-color: var(--purple); }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%;
      background: var(--red); border: 1.5px solid var(--ink); }
    .dot.ok { background: var(--green); }
    #leave { flex: none; padding: .45rem .6rem; font: 700 9px var(--px-display);
      text-transform: uppercase; color: var(--red); background: var(--card);
      border: 2px solid var(--red); border-radius: 8px; cursor: pointer;
      box-shadow: 2px 2px 0 rgba(54,38,25,.18); }
    #leave:active { transform: translate(1px, 1px); box-shadow: none; }

    /* Phones suspend audio when the screen sleeps; resuming needs a real tap.
       These overlays make that unmissable instead of a tiny HUD label. */
    #unmute, #leftscreen { position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: .7rem; cursor: pointer; text-align: center;
      background: var(--paper); }
    #unmute h1, #leftscreen h1 { font-size: 4rem; }
    #unmute b, #leftscreen b { font: 700 1rem var(--px-display); text-transform: uppercase; }
    #unmute .s, #leftscreen .s { color: var(--ink-soft); font-size: .95rem; max-width: 30ch; }
  </style>
</head>
<body>
  <div id="join">
    <img src="../assets/pixel/logo_wand.png" alt="">
    <h1>TAP TO JOIN</h1>
    <p id="joinsub">the orchestra</p>
    <div class="chip">🔊 sound on · keep me face up</div>
  </div>

  <div id="stage">
    <div id="stagearea">
      <img id="artist" src="../assets/synth.png" alt="">
      <div id="instnm">—</div>
    </div>
    <div id="hud">
      <div id="hudtop">
        <span class="dot" id="dot"></span> <span id="sid">connecting…</span>
        <button id="leave">✕ leave</button>
      </div>
      <details id="nerd">
        <summary>· · ·</summary>
        <div class="grid">
          <div><span class="k">audio</span> <span id="audio">—</span></div>
          <div><span class="k">θ offset</span> <span id="theta">—</span></div>
          <div><span class="k">recv</span> <span id="recv">0</span></div>
          <div><span class="k">played</span> <span id="clicks">0</span></div>
          <div><span class="k">rtt</span> <span id="rtt">—</span></div>
          <div><span class="k">last</span> <span id="last">—</span></div>
          <div id="trimrow">
            <span class="k">trim</span>
            <input type="range" id="trim" min="-100" max="100" value="0" step="1">
            <span id="trimval">0ms</span>
          </div>
        </div>
      </details>
    </div>
  </div>

  <div id="unmute" style="display:none">
    <h1>🔇</h1>
    <p><b>Tap to unmute</b></p>
    <p class="s">your phone paused the audio while the screen was off</p>
  </div>

  <div id="leftscreen" style="display:none">
    <h1>👋</h1>
    <p><b>You left the orchestra</b></p>
    <p class="s">tap anywhere to rejoin</p>
  </div>

  <script type="module" src="./section.js"></script>
</body>
</html>
