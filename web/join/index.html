<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#0c0608">
  <title>Wand Maestro — Join</title>
  <style>
    :root {
      --serif: "Cinzel", "Bodoni MT", Georgia, serif; --sans: "Segoe UI", system-ui, sans-serif;
      --gold: #e7c583; --gold-hi: #ffe3a3; --gold-dim: #b9903f; --cream: #f6e7c9; --line: #4a2530; --panel: #190a0e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { min-height: 100vh; font-family: var(--sans); color: var(--cream);
      background: radial-gradient(130% 100% at 50% -10%, #3a1017, #0c0608 58%) fixed;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 1.5rem; text-align: center; gap: .4rem; }
    h1 { font-family: var(--serif); color: var(--gold-hi); font-size: clamp(2rem, 10vw, 3rem); letter-spacing: .08em;
      text-shadow: 0 0 14px rgba(255,178,76,.4); }
    p.tag { color: var(--gold-dim); margin-bottom: 1.5rem; }
    a.opt { text-decoration: none; color: var(--cream); background: var(--panel); border: 1px solid var(--line);
      border-radius: 16px; padding: 1.6rem 1.2rem; width: 100%; max-width: 360px; margin: .5rem 0;
      display: block; transition: all .15s; }
    a.opt:active { transform: scale(.98); border-color: var(--gold); }
    a.opt .ico { font-size: 2.8rem; }
    a.opt .t { font-family: var(--serif); color: var(--gold); font-size: 1.35rem; margin: .4rem 0 .25rem; letter-spacing: .04em; }
    a.opt .s { color: var(--gold-dim); font-size: .9rem; line-height: 1.4; }
  </style>
</head>
<body>
  <h1>♪ Join the Orchestra</h1>
  <p class="tag">Pick one — you can switch later.</p>

  <a class="opt" id="conduct">
    <div class="ico">🪄</div>
    <div class="t">Conduct</div>
    <div class="s">Wave &amp; tilt your phone like a wand to shape the music.</div>
  </a>

  <a class="opt" id="instrument">
    <div class="ico">🎻</div>
    <div class="t">Be an instrument</div>
    <div class="s">Your phone becomes one instrument and plays its part.</div>
  </a>

  <script>
    // Carry the session id onto both links (defaults to lol1).
    const s = new URLSearchParams(location.search).get("s") || "lol1";
    document.getElementById("conduct").href = `../wandsim/?s=${encodeURIComponent(s)}`;
    document.getElementById("instrument").href = `../section/?s=${encodeURIComponent(s)}`;
  </script>
</body>
</html>
