<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#07090e">
  <title>Ensemble — Phone Wand</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
    html, body { height: 100%; font-family: ui-monospace, "Courier New", monospace; background: #0c0608; color: #f6e7c9; overflow: hidden; }
    #enable {
      position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem; padding: 2rem; text-align: center;
      background: radial-gradient(circle at 50% 40%, #1a1206, #0c0608); cursor: pointer;
    }
    #enable h1 { font-size: clamp(1.8rem, 9vw, 3rem); font-weight: 800; color: #e7c583; text-shadow: 0 2px 0 #7a4a12; }
    #enable p { opacity: 0.65; max-width: 30ch; line-height: 1.4; }
    #enable .go { margin-top: 0.5rem; padding: 0.9rem 1.6rem; background: #e7c583; color: #1a120a; border-radius: 12px; font-weight: 700; font-size: 1.1rem; }
    #err { color: #ff8f8f; font-size: 0.9rem; min-height: 1.2em; }

    #wand { position: fixed; inset: 0; display: none; flex-direction: column; }
    #pad { flex: 1; position: relative; display: flex; align-items: center; justify-content: center;
           background: #12100a; transition: background 80ms; touch-action: none; }
    #pad.grab { background: #14361f; }
    #padlabel { font-size: clamp(1.5rem, 7vw, 2.4rem); font-weight: 800; opacity: 0.85; text-align: center; pointer-events: none; color: #e7c583; }
    #tilt { position: absolute; width: 26px; height: 26px; border-radius: 50%; background: #e7c583;
            box-shadow: 0 0 24px #e7c583; pointer-events: none; }
    #hud { display: grid; grid-template-columns: repeat(4,1fr); gap: 0.2rem 0.8rem;
           padding: 0.55rem 1rem; background: #0c0608; border-top: 1px solid #3a2c1a; font: 12px ui-monospace, monospace; }
    #hud .k { opacity: 0.5; }
    #hud .grab { color: #46d17a; font-weight: 700; }
    #controls { display: flex; gap: 0.5rem; padding: 0.5rem 1rem calc(0.6rem + env(safe-area-inset-bottom)); background: #05070b; }
    #controls button { flex: 1; font: 700 13px ui-monospace, monospace; padding: 0.7rem 0.4rem; border: 0; border-radius: 8px; background: #2a2016; color: #f6e7c9; }
    #controls .up { background: #2f8f56; } #controls .down { background: #8f3030; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #e5484d; }
    .dot.ok { background: #46d17a; }
  </style>
</head>
<body>
  <div id="enable">
    <h1>🪄 Phone Wand</h1>
    <p>Turn your phone into a conductor's wand. Wave and tilt it to shape the music; press and hold the screen to “grab.”</p>
    <div class="go">Enable motion &amp; connect</div>
    <div id="err"></div>
  </div>

  <div id="wand">
    <div id="pad">
      <div id="tilt"></div>
      <div id="padlabel">HOLD TO GRAB</div>
    </div>
    <div id="hud">
      <div><span class="k">conn</span> <span class="dot" id="dot"></span> <span>sim</span></div>
      <div><span class="k">state</span> <span id="grabstate">open</span></div>
      <div><span class="k">|accel|</span> <span id="accel">—</span></div>
      <div><span class="k">rate</span> <span id="rate">—</span>/s</div>
    </div>
    <div id="controls">
      <button class="up" id="thumbup">👍</button>
      <button class="down" id="thumbdown">👎</button>
      <button id="recal">🎯 aim</button>
      <button id="cycle">↻ section</button>
    </div>
  </div>

  <script type="module" src="./wandsim.js"></script>
</body>
</html>
