<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#160a0c">
  <title>Wand Maestro — Stage</title>
  <style>
    /* ─── Wand Maestro · one warm, opulent design language ───
       Deep crimson + antique gold, an elegant display serif for titles, a clean
       face for the HUD. The generated stage is the star; everything around it is
       styled to match, so art + type + UI read as one beautiful whole. */
    :root {
      --serif: "Cinzel", "Bodoni MT", "Didot", "Playfair Display", Georgia, serif;
      --sans: "Segoe UI", system-ui, -apple-system, sans-serif;
      --mono: ui-monospace, "Cascadia Code", "Courier New", monospace;
      --gold: #e7c583; --gold-hi: #ffe3a3; --gold-dim: #b9903f;
      --wine: #2a0d12; --wine-2: #1b0709; --cream: #f6e7c9; --ink: #140a0c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0c0608; color: var(--cream);
      font-family: var(--sans); overflow: hidden; }
    img { image-rendering: pixelated; -ms-interpolation-mode: nearest-neighbor;
      user-select: none; -webkit-user-drag: none; }

    /* The 448×256 stage, fit to the viewport; the generated backdrop fills it and
       every ornament positions in % of this box, so the scene scales as one. */
    #stagewrap {
      position: absolute; inset: 0; margin: auto; overflow: hidden;
      width: min(100vw, calc(100vh * (448 / 256)));
      height: min(100vh, calc(100vw * (256 / 448)));
      aspect-ratio: 448 / 256; background: #0c0608;
      box-shadow: 0 0 0 100vmax #0c0608;   /* letterbox in the same warm black */
      isolation: isolate;                  /* contain the stage's z-layers so the
                                              fixed HUD/join-card sit above them */
    }
    #backdrop { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }

    /* Warm spotlight beams — soft, screen-blended, breathing gently (no flashing). */
    #lights { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
    .beam { position: absolute; top: -8%; width: auto; transform-origin: top center;
      mix-blend-mode: screen; opacity: .5; filter: saturate(1.1); }
    .b1 { left: 20%; animation: beam1 7s ease-in-out infinite; }
    .b2 { left: 50%; animation: beam2 6s ease-in-out infinite; }
    .b3 { right: 20%; animation: beam3 8s ease-in-out infinite; }
    @keyframes beam1 { 0%,100% { opacity: .38; transform: translateX(-50%) rotate(9deg); }
                       50% { opacity: .66; transform: translateX(-50%) rotate(15deg); } }
    @keyframes beam2 { 0%,100% { opacity: .5; transform: translateX(-50%) rotate(-3deg); }
                       50% { opacity: .78; transform: translateX(-50%) rotate(3deg); } }
    @keyframes beam3 { 0%,100% { opacity: .38; transform: translateX(50%) rotate(-9deg); }
                       50% { opacity: .66; transform: translateX(50%) rotate(-15deg); } }

    /* A glowing chandelier sways over the house. */
    #chandelier { position: absolute; top: -1%; left: 50%; z-index: 6; width: auto;
      transform-origin: top center; animation: sway 6s ease-in-out infinite;
      filter: drop-shadow(0 0 7px rgba(255,206,120,.55)); }
    @keyframes sway { 0%,100% { transform: translateX(-50%) rotate(-2.2deg); }
                      50% { transform: translateX(-50%) rotate(2.2deg); } }

    /* Warm footlight glow washing up the players; brightens gently on the beat. */
    #footlights { position: absolute; left: 0; right: 0; bottom: 0; height: 34%; z-index: 8;
      pointer-events: none; mix-blend-mode: screen; opacity: .55; transition: opacity 90ms ease-out;
      background: radial-gradient(120% 100% at 50% 100%, rgba(255,196,110,.55), rgba(255,196,110,0) 62%); }
    #footlights.beat { opacity: .95; }

    /* Musicians: bottom-centre anchored on the floor line, sized from JS. */
    .player { position: absolute; transform: translate(-50%, -100%); }
    .player .sprite { display: block; width: auto;
      transition: transform 100ms cubic-bezier(.2,.8,.3,1.5); }
    .player.hit .sprite { transform: translateY(-14%) scale(1.035); }
    .player .shadow { position: absolute; left: 50%; bottom: 2%; transform: translateX(-50%);
      width: 58%; height: 8%; z-index: -1; border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(0,0,0,.5), rgba(0,0,0,0) 70%); }
    .player .tag { position: absolute; left: 50%; top: 101%; transform: translateX(-50%);
      font: 600 9px var(--mono); text-align: center; color: var(--gold);
      text-shadow: 0 1px 2px #000, 0 0 3px #000; white-space: nowrap; letter-spacing: .04em; }
    .player .tag .off { color: #b98c6a; }
    .player.dropped .sprite { filter: grayscale(1) brightness(.5); }

    .pulse { position: absolute; transform: translate(-50%, -50%); pointer-events: none;
      animation: floatup 820ms ease-out forwards; }
    @keyframes floatup {
      0%   { opacity: 0; transform: translate(-50%, -40%) scale(.5); }
      22%  { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -250%) scale(1.15); }
    }
    .sparkle-fx { position: absolute; transform: translate(-50%, -50%); pointer-events: none;
      animation: sparklefloat linear forwards; }
    @keyframes sparklefloat {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.3) rotate(0); }
      25% { opacity: .95; }
      100% { opacity: 0; transform: translate(-50%, -170%) scale(1) rotate(80deg); }
    }

    /* Ornate conductor's stand + the maestro's wand, front-and-centre. */
    #podium { position: absolute; left: 50%; bottom: 2%; transform: translateX(-50%);
      width: auto; z-index: 44; filter: drop-shadow(0 3px 4px rgba(0,0,0,.5)); }
    #wand { position: absolute; left: 50%; bottom: 12%; width: auto; z-index: 50;
      transform-origin: center bottom; animation: bob 3s ease-in-out infinite; transition: filter 220ms;
      filter: drop-shadow(0 0 5px rgba(255,214,130,.5)); }
    @keyframes bob { 0%,100% { transform: translate(-50%, 0) rotate(-4deg); }
                     50% { transform: translate(-50%, -12%) rotate(4deg); } }
    #wand.armed { filter: drop-shadow(0 0 8px var(--gold-hi)) drop-shadow(0 0 16px #ff9d3c); }

    /* Marquee title — elegant gilded plaque, always above the curtains. */
    #marquee { position: absolute; top: 3%; left: 50%; transform: translateX(-50%); z-index: 120;
      padding: 3px 18px; white-space: nowrap; border-radius: 4px;
      font: 800 clamp(9px, 2.2vw, 22px)/1 var(--serif); letter-spacing: .22em;
      color: var(--gold-hi);
      background: linear-gradient(#38121a, #200a0e);
      border: 1px solid var(--gold-dim);
      box-shadow: 0 0 0 3px #200a0e, 0 0 0 4px var(--gold-dim), 0 6px 16px rgba(0,0,0,.55),
        inset 0 0 14px rgba(255,206,120,.22);
      text-shadow: 0 0 8px rgba(255,178,76,.6), 0 1px 0 #6a3d10;
      animation: title-glow 3.2s ease-in-out infinite; }
    @keyframes title-glow {
      0%,100% { text-shadow: 0 0 8px rgba(255,178,76,.5), 0 1px 0 #6a3d10; }
      50% { text-shadow: 0 0 16px rgba(255,224,140,.85), 0 0 26px rgba(255,157,60,.6), 0 1px 0 #6a3d10; } }

    /* Intro curtains — the pixel-art closed drape, split into two halves that
       part on reveal. background-size:200% 100% draws the full 448×256 curtain
       across the pair with no distortion; each half shows its side. */
    .curtain { position: absolute; top: 0; height: 100%; width: 50%; z-index: 100;
      background-image: url(../assets/curtain_closed.png); background-size: 200% 100%;
      background-repeat: no-repeat; image-rendering: pixelated;
      box-shadow: inset 0 0 40px rgba(0,0,0,.35);
      transition: transform 1.9s cubic-bezier(.7,0,.25,1); }
    #curtainL { left: 0; background-position: left center; }
    #curtainR { right: 0; background-position: right center; }
    .reveal #curtainL { transform: translateX(-100%); }
    .reveal #curtainR { transform: translateX(100%); }

    /* ─── HUD, join card, dock — all warm gold-on-crimson to match the stage ─── */
    .panel { background: linear-gradient(#2a0d12ee, #180709ee);
      border: 1px solid var(--gold-dim);
      box-shadow: 0 0 0 3px #180709, 0 8px 26px rgba(0,0,0,.5), inset 0 0 20px rgba(120,40,30,.25);
      border-radius: 6px; }
    #hud { position: fixed; top: 16px; left: 16px; width: 250px; padding: 16px 18px 16px;
      font-size: 12px; line-height: 1.55; }
    #hud h1 { font: 800 17px/1 var(--serif); letter-spacing: .14em; color: var(--gold-hi);
      text-shadow: 0 0 10px rgba(255,178,76,.5), 0 1px 0 #6a3d10; margin-bottom: 10px;
      padding-bottom: 10px; border-bottom: 1px solid rgba(183,144,63,.35); }
    #hud .row { display: flex; justify-content: space-between; gap: 8px; }
    #hud .k { color: #c9a06a; }
    #hud .row span:last-child { font-family: var(--mono); }
    #spread { font-weight: 700; }
    #admin { display: flex; gap: 6px; margin-top: 12px; }
    #admin button, .btn-gold { cursor: pointer; font-family: var(--sans); font-weight: 700;
      color: #24120a; border: 0; border-radius: 4px;
      background: linear-gradient(#ffe3a3, #e0b45c); box-shadow: inset 0 -2px 0 rgba(120,70,10,.35); }
    #admin button { flex: 1; font-size: 11px; padding: 7px 4px; }
    #admin button.stop { background: linear-gradient(#f0a0a0, #d76a6a); color: #3a0d0d; }
    #admin button.warn { background: linear-gradient(#f2c983, #e0a54a); }
    .btn-gold { display: block; margin-top: 12px; text-align: center; text-decoration: none;
      font-size: 12px; letter-spacing: .04em; padding: 9px 6px; }
    #hud .links { margin-top: 8px; font-size: 11px; display: flex; justify-content: center; gap: 14px; }
    #hud .links a { color: var(--gold); text-decoration: none; }
    #hud .links a:hover { color: var(--gold-hi); }

    #joincard { position: fixed; right: 16px; bottom: 16px; padding: 16px 18px 13px;
      text-align: center; font-size: 11px; }
    #joincard .lbl { font: 800 12px var(--serif); letter-spacing: .16em; color: var(--gold-hi); margin-bottom: 8px; }
    #qr { width: 128px; height: 128px; margin: 0 auto; background: #fdf6e6; padding: 6px;
      border-radius: 4px; box-shadow: inset 0 0 0 2px var(--gold-dim); }
    #qr svg { width: 100%; height: 100%; display: block; }
    #joincard a { color: var(--gold-hi); cursor: pointer; }
    #joinsub { margin-top: 8px; color: #d8b98a; max-width: 150px; }

    #camtoggle { position: fixed; left: 16px; bottom: 16px; z-index: 15; cursor: pointer;
      padding: 11px 15px; font: 700 12px var(--sans); letter-spacing: .04em; color: var(--gold-hi);
      background: transparent; }
    #camtoggle:hover { color: #fff2d4; }
    #camdock { position: fixed; left: 16px; bottom: 16px; z-index: 16; width: 340px; height: 300px;
      display: flex; flex-direction: column; padding: 16px 10px 12px; }
    #camhead { display: flex; justify-content: space-between; align-items: center;
      font: 800 11px var(--serif); letter-spacing: .1em; color: var(--gold-hi); padding: 0 4px 7px; }
    #camhead .grp { display: flex; gap: 10px; align-items: center; }
    #camhead a, #camhead button { color: var(--gold-hi); background: transparent; border: 0;
      cursor: pointer; text-decoration: none; font-size: 14px; line-height: 1; }
    #camframe { flex: 1; width: 100%; border: 0; border-radius: 4px; background: #000; }
    [hidden] { display: none !important; }

    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #b5484d;
      box-shadow: 0 0 5px rgba(181,72,77,.7); }
    .dot.ok { background: #6cc98a; box-shadow: 0 0 6px rgba(108,201,138,.8); }

    /* Curtain-raiser splash. */
    #splash { position: fixed; inset: 0; z-index: 200; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px; cursor: pointer;
      background: radial-gradient(ellipse at 50% 40%, #3a1016f2, #0c0608fa); }
    #splash h1 { font: 800 clamp(30px, 8vw, 64px)/1 var(--serif); letter-spacing: .1em; color: var(--gold-hi);
      text-shadow: 0 0 18px rgba(255,178,76,.55), 0 3px 0 #5a2f0c, 0 5px 14px #000; }
    #splash p { color: #d8b98a; font-style: italic; letter-spacing: .04em; }
    #splash .go { margin-top: 8px; padding: 12px 30px; font: 800 18px var(--serif); letter-spacing: .08em;
      color: #24120a; background: linear-gradient(#ffe3a3, #e0b45c); border-radius: 6px;
      box-shadow: 0 0 0 2px #7a4a12, 0 6px 18px rgba(0,0,0,.5); }
  </style>
</head>
<body>
  <div id="stagewrap">
    <img id="backdrop" src="../assets/backdrop.png" alt="stage">
    <div id="lights">
      <img class="beam b1" src="../assets/spotlight.png" alt="">
      <img class="beam b2" src="../assets/spotlight.png" alt="">
      <img class="beam b3" src="../assets/spotlight.png" alt="">
    </div>
    <img id="chandelier" src="../assets/chandelier.png" alt="">
    <div id="footlights"></div>
    <div id="players"></div>
    <div id="fx"></div>
    <img id="podium" src="../assets/podium.png" alt="">
    <img id="wand" src="../assets/wand2.png" alt="wand">
    <div id="marquee">WAND&nbsp;MAESTRO</div>
    <div id="curtainL" class="curtain"></div>
    <div id="curtainR" class="curtain"></div>
  </div>

  <div id="hud" class="panel">
    <h1>Wand Maestro</h1>
    <div class="row"><span class="k" id="status">connecting…</span></div>
    <div class="row"><span class="k">clock spread</span> <span id="spread">—</span></div>
    <div class="row"><span class="k">performers</span> <span id="count">0</span></div>
    <div class="row"><span class="k">wand</span> <span><span class="dot" id="wanddot"></span> <span id="wandstate">—</span></span></div>
    <div id="admin">
      <button id="start2">▶ Start</button>
      <button id="stop" class="stop">■ Stop</button>
      <button id="panic" class="warn">✷ off</button>
    </div>
    <a href="../editor/" target="_blank" class="btn-gold">🎛 OPEN EDITOR</a>
    <div class="links">
      <a href="#" id="introbtn">🎬 replay intro</a>
      <a href="../guide/" target="_blank">📖 how it works</a>
    </div>
  </div>

  <div id="joincard" class="panel">
    <div class="lbl">SCAN TO JOIN</div>
    <div id="qr"></div>
    <div id="joinsub">your phone becomes an instrument · <a id="cvlink">conduct with webcam →</a></div>
  </div>

  <button id="camtoggle" class="panel">🎥 webcam wand</button>
  <div id="camdock" class="panel" hidden>
    <div id="camhead">
      <span>🎥 WEBCAM WAND</span>
      <span class="grp">
        <a id="campop" href="../cvwand/" target="_blank" title="open in its own tab">⤢</a>
        <button id="camclose" title="close">✕</button>
      </span>
    </div>
    <iframe id="camframe" title="webcam wand" allow="camera"></iframe>
  </div>

  <div id="splash">
    <h1>Wand Maestro</h1>
    <p>the orchestra awaits</p>
    <div class="go">Raise the Curtain</div>
  </div>

  <script src="../vendor/qrcode.js"></script>
  <script type="module" src="./stagepix.js"></script>
  <script type="module" src="../shared/stageviz.js"></script>
</body>
</html>
