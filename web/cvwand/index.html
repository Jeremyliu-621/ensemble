<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wand Maestro — CV Wand</title>
  <link rel="stylesheet" href="../shared/pixel.css">
  <style>
    /* Seamless camera wand: no buttons, no dials. The camera starts itself;
       your hand is the interface (pinch = grab, open palm = transport).
       Lives inside the console's laptop-hub screen, so it stays dark. */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #191410; color: #f5ead2; overflow: hidden;
      font-family: var(--px-body); }
    #view { position: fixed; inset: 0; background: #000; }
    #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; visibility: hidden; }
    #canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    #dot { position: absolute; left: 8px; top: 8px; z-index: 6; width: 9px; height: 9px;
      border-radius: 50%; background: #d9534a; border: 1.5px solid #000; opacity: .9; }
    #dot.ok { background: #3fae4a; }
    #loading { position: absolute; left: 50%; top: 45%; transform: translate(-50%, -50%);
      z-index: 5; text-align: center; font-size: 13px; line-height: 1.5; color: #cbbfa8;
      background: rgba(10, 8, 6, .85); padding: .6rem .9rem; border-radius: 10px; max-width: 34ch; }
    #loading b, #loading a { color: #f5ead2; }
    #hint { position: absolute; left: 50%; bottom: 8px; transform: translateX(-50%); z-index: 5;
      font: 700 8px var(--px-display); text-transform: uppercase; letter-spacing: .08em;
      color: #f5ead2; background: rgba(10, 8, 6, .7); padding: .3rem .6rem; border-radius: 8px;
      white-space: nowrap; transition: opacity 1s; pointer-events: none; }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <div id="view">
    <video id="video" playsinline muted></video>
    <canvas id="canvas"></canvas>
    <span id="dot" title="wand link"></span>
    <div id="loading">starting camera…</div>
    <div id="hint" hidden>🤏 pinch = conduct · ✋ palm = play/pause</div>
  </div>
  <script type="module" src="./cvwand.js"></script>
</body>
</html>
